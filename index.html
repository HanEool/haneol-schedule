<!DOCTYPE html>
<html lang="ko" data-theme="bright">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="한얼 스케줄">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#9b8abf">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="app-icon.png">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect x='4' y='12' width='56' height='48' rx='6' fill='none' stroke='%239b8abf' stroke-width='3'/%3E%3Crect x='4' y='12' width='56' height='14' rx='6' fill='%239b8abf'/%3E%3Cline x1='20' y1='6' x2='20' y2='18' stroke='%239b8abf' stroke-width='3' stroke-linecap='round'/%3E%3Cline x1='44' y1='6' x2='44' y2='18' stroke='%239b8abf' stroke-width='3' stroke-linecap='round'/%3E%3Ccircle cx='22' cy='38' r='3' fill='%2388aec8'/%3E%3Ccircle cx='32' cy='38' r='3' fill='%237cb5a0'/%3E%3Ccircle cx='42' cy='38' r='3' fill='%23c4929c'/%3E%3Ccircle cx='22' cy='50' r='3' fill='%23c4b07a'/%3E%3Ccircle cx='32' cy='50' r='3' fill='%2388aec8'/%3E%3Ccircle cx='42' cy='50' r='3' fill='%239b8abf'/%3E%3C/svg%3E">
<title>한얼 스케줄</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600&family=Nanum+Myeongjo:wght@400;700&display=swap');

  [data-theme="bright"] {
    --bg: #f4f1ed;--surface: #ffffff;--surface2: #f9f7f4;--border: #e0dbd5;--border-lt: #ece8e3;
    --text: #3a3530;--text-dim: #978f86;--text-faint: #c4bdb5;
    --accent: #9b8abf;--accent-soft: rgba(155,138,191,0.12);--accent-mid: rgba(155,138,191,0.25);--accent-fg: #fff;
    --mint: #7cb5a0;--mint-soft: rgba(124,181,160,0.12);
    --rose: #c4929c;--rose-soft: rgba(196,146,156,0.12);
    --gold: #c4b07a;--gold-soft: rgba(196,176,122,0.12);
    --sky: #88aec8;--sky-soft: rgba(136,174,200,0.12);
    --sh-sm: 0 1px 3px rgba(58,53,48,0.04);--sh-md: 0 4px 16px rgba(58,53,48,0.06);--sh-lg: 0 8px 32px rgba(58,53,48,0.10);
    --overlay: rgba(58,53,48,0.3);
  }

  [data-theme="dark"] {
    --bg: #18161e;--surface: #211f28;--surface2: #2a2832;--border: #37343e;--border-lt: #2f2d38;
    --text: #e6e2dc;--text-dim: #8e8898;--text-faint: #55505e;
    --accent: #b0a0d0;--accent-soft: rgba(176,160,208,0.12);--accent-mid: rgba(176,160,208,0.22);--accent-fg: #18161e;
    --mint: #8ccaae;--mint-soft: rgba(140,202,174,0.12);
    --rose: #d4a4ae;--rose-soft: rgba(212,164,174,0.12);
    --gold: #d4c48e;--gold-soft: rgba(212,196,142,0.12);
    --sky: #94b8d4;--sky-soft: rgba(148,184,212,0.12);
    --sh-sm: 0 1px 3px rgba(0,0,0,0.15);--sh-md: 0 4px 16px rgba(0,0,0,0.20);--sh-lg: 0 8px 32px rgba(0,0,0,0.30);
    --overlay: rgba(0,0,0,0.5);
  }

  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);
    min-height:100vh;min-height:100dvh;font-size:14px;line-height:1.65;
    transition:background .4s,color .3s;
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
    padding-left:env(safe-area-inset-left);
    padding-right:env(safe-area-inset-right);
    -webkit-user-select:none;user-select:none;
    -webkit-tap-highlight-color:transparent;
    overscroll-behavior:none;
  }
  input,select,textarea{-webkit-user-select:text;user-select:text}
  .app{max-width:640px;margin:0 auto;padding:28px 20px 100px}

  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
  .header-left h1{font-family:'Nanum Myeongjo',serif;font-size:20px;font-weight:700;letter-spacing:-.03em}
  .header-left h1 span{color:var(--accent)}
  .header-right{display:flex;align-items:center;gap:8px}

  .icon-btn{
    width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--surface);
    color:var(--text-dim);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:all .25s;box-shadow:var(--sh-sm);
  }
  .icon-btn:hover{border-color:var(--accent);color:var(--accent);box-shadow:var(--sh-md)}

  .sync-btn{
    height:36px;padding:0 14px;border-radius:10px;border:1px solid var(--border);background:var(--surface);
    color:var(--text-dim);font-size:12px;font-family:inherit;cursor:pointer;transition:all .25s;box-shadow:var(--sh-sm);
  }
  .sync-btn:hover{border-color:var(--accent);color:var(--accent)}
  .sync-btn:disabled{opacity:.5;cursor:not-allowed}

  .tabs{display:flex;gap:4px;margin-bottom:24px}
  .tab{
    flex:1;padding:10px 0;text-align:center;font-size:13px;font-weight:500;
    color:var(--text-dim);background:transparent;border:none;
    border-bottom:2px solid transparent;cursor:pointer;font-family:inherit;transition:all .25s;
  }
  .tab:hover{color:var(--text)}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .tab-panel{display:none}.tab-panel.active{display:block}

  .card{
    background:var(--surface);border:1px solid var(--border-lt);border-radius:14px;
    padding:16px 18px;margin-bottom:10px;box-shadow:var(--sh-sm);transition:all .25s;
  }
  .card:hover{box-shadow:var(--sh-md);border-color:var(--border)}
  .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .card-title{font-weight:600;font-size:14.5px;letter-spacing:-.01em}
  .card-meta{font-size:12px;color:var(--text-dim);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .card-actions{display:flex;gap:4px}

  .btn-sm{
    background:transparent;border:1px solid var(--border);color:var(--text-dim);
    padding:4px 10px;border-radius:7px;font-size:11px;font-family:inherit;cursor:pointer;transition:all .2s;
  }
  .btn-sm:hover{border-color:var(--accent);color:var(--accent)}
  .btn-sm.danger:hover{border-color:var(--rose);color:var(--rose)}

  .badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;font-size:10.5px;font-weight:500;letter-spacing:.02em}
  .badge-routine{background:var(--sky-soft);color:var(--sky)}
  .badge-event{background:var(--mint-soft);color:var(--mint)}
  .badge-cancelled{background:var(--rose-soft);color:var(--rose);text-decoration:line-through}
  .badge-modified{background:var(--gold-soft);color:var(--gold)}
  .badge-care{background:var(--accent-soft);color:var(--accent)}

  .care-status{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:10.5px;font-weight:600;letter-spacing:.02em}
  .care-ok{background:var(--mint-soft);color:var(--mint)}
  .care-soon{background:var(--gold-soft);color:var(--gold)}
  .care-overdue{background:var(--rose-soft);color:var(--rose)}
  .care-scheduled{background:var(--sky-soft);color:var(--sky)}
  .care-habit{background:var(--accent-soft);color:var(--accent)}

  .mode-toggle{display:flex;gap:4px;margin-bottom:12px}
  .mode-btn{
    flex:1;padding:8px 0;text-align:center;font-size:12px;font-weight:500;
    color:var(--text-dim);background:var(--surface2);border:1px solid var(--border);
    border-radius:8px;cursor:pointer;font-family:inherit;transition:all .2s;
  }
  .mode-btn.active{background:var(--accent);color:var(--accent-fg);border-color:var(--accent)}

  .consecutive-fields{display:none}
  .consecutive-fields.show{display:flex;gap:12px}
  .weekly-fields.hide{display:none}

  .tag-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
  .tag-chip{
    padding:5px 12px;border-radius:8px;font-size:11.5px;font-weight:500;
    background:var(--surface2);color:var(--text-dim);border:1px solid var(--border);
    cursor:pointer;transition:all .2s;font-family:inherit;
  }
  .tag-chip:hover{border-color:var(--accent);color:var(--accent)}
  .tag-chip.active{background:var(--accent);color:var(--accent-fg);border-color:var(--accent)}

  .consecutive-badge{font-size:12px;color:var(--accent);font-weight:500;margin-top:10px}

  .care-progress{margin-top:8px;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
  .care-progress-bar{height:100%;border-radius:2px;transition:width .3s}
  .care-progress-bar.ok{background:var(--mint)}
  .care-progress-bar.soon{background:var(--gold)}
  .care-progress-bar.overdue{background:var(--rose)}

  .day-chips{display:flex;gap:5px;margin-top:10px}
  .day-chip{
    width:28px;height:28px;display:flex;align-items:center;justify-content:center;
    border-radius:8px;font-size:11px;font-weight:500;background:var(--surface2);color:var(--text-faint);transition:all .2s;
  }
  .day-chip.active{background:var(--accent-soft);color:var(--accent);font-weight:600}

  .form-overlay{
    display:none;position:fixed;inset:0;background:var(--overlay);z-index:100;
    align-items:flex-end;justify-content:center;
    backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  }
  .form-overlay.open{display:flex}
  .form-panel{
    background:var(--surface);border-top:1px solid var(--border);
    border-radius:20px 20px 0 0;width:100%;max-width:640px;
    padding:28px 24px calc(32px + env(safe-area-inset-bottom));
    max-height:85vh;overflow-y:auto;box-shadow:var(--sh-lg);
  }
  .form-title{font-family:'Nanum Myeongjo',serif;font-size:17px;font-weight:700;margin-bottom:24px}
  .form-group{margin-bottom:18px}
  .form-group label{display:block;font-size:11.5px;font-weight:500;color:var(--text-dim);margin-bottom:7px;letter-spacing:.03em}
  .form-group input,.form-group select{
    width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);
    padding:11px 14px;border-radius:10px;font-size:16px;font-family:inherit;outline:none;transition:all .25s;
  }
  .form-group input:focus,.form-group select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .form-row{display:flex;gap:12px}.form-row .form-group{flex:1}

  .day-selector{display:flex;gap:6px}
  .day-toggle{
    width:38px;height:38px;display:flex;align-items:center;justify-content:center;
    border-radius:10px;font-size:13px;font-weight:500;
    background:var(--bg);color:var(--text-dim);border:1px solid var(--border);
    cursor:pointer;transition:all .2s;font-family:inherit;
  }
  .day-toggle.selected{background:var(--accent);color:var(--accent-fg);border-color:var(--accent)}

  .form-actions{display:flex;gap:8px;margin-top:24px}
  .btn{
    flex:1;padding:12px;border-radius:12px;font-size:14px;font-weight:500;
    font-family:inherit;cursor:pointer;border:none;transition:all .25s;
  }
  .btn-primary{background:var(--accent);color:var(--accent-fg);box-shadow:0 2px 8px var(--accent-soft)}
  .btn-primary:hover{opacity:.9;transform:translateY(-1px)}
  .btn-primary:disabled{opacity:.5;transform:none;cursor:not-allowed}
  .btn-secondary{background:var(--surface2);color:var(--text-dim);border:1px solid var(--border)}
  .btn-secondary:hover{color:var(--text);border-color:var(--text-dim)}

  .week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
  .week-nav-btn{
    background:var(--surface);border:1px solid var(--border);color:var(--text-dim);
    width:34px;height:34px;border-radius:10px;font-size:15px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;font-family:inherit;
    transition:all .2s;box-shadow:var(--sh-sm);
  }
  .week-nav-btn:hover{border-color:var(--accent);color:var(--accent)}
  .week-label{font-family:'Nanum Myeongjo',serif;font-size:15px;font-weight:700}

  .day-section{margin-bottom:14px}
  .day-header{
    font-size:12px;font-weight:500;color:var(--text-dim);padding:8px 2px 6px;
    display:flex;justify-content:space-between;align-items:center;letter-spacing:.02em;
  }
  .day-header.today{color:var(--accent);font-weight:600}

  .week-item{
    display:flex;align-items:center;gap:12px;padding:10px 14px;
    background:var(--surface);border-radius:10px;margin-bottom:4px;
    border-left:3px solid transparent;box-shadow:var(--sh-sm);transition:all .2s;
  }
  .week-item:hover{box-shadow:var(--sh-md)}
  .week-item.routine{border-left-color:var(--sky)}
  .week-item.event{border-left-color:var(--mint)}
  .week-item.cancelled{border-left-color:var(--rose);opacity:.5}
  .week-item.modified{border-left-color:var(--gold)}
  .week-item-time{font-size:12px;color:var(--text-dim);min-width:100px;font-variant-numeric:tabular-nums}
  .week-item-title{font-size:13px;flex:1}
  .week-item.cancelled .week-item-title{text-decoration:line-through}

  .empty-day{padding:6px 14px;font-size:12px;color:var(--text-faint)}
  .empty-state{text-align:center;padding:48px 20px;color:var(--text-dim);font-size:13px}

  .add-fab{
    position:fixed;bottom:calc(28px + env(safe-area-inset-bottom));right:28px;
    width:50px;height:50px;border-radius:15px;
    background:var(--accent);color:var(--accent-fg);font-size:22px;border:none;cursor:pointer;
    box-shadow:0 4px 20px var(--accent-mid);display:flex;align-items:center;justify-content:center;
    transition:all .25s;z-index:50;
  }
  .add-fab:hover{transform:translateY(-2px);box-shadow:0 6px 28px var(--accent-mid)}

  .toast{
    position:fixed;bottom:calc(92px + env(safe-area-inset-bottom));left:50%;
    transform:translateX(-50%) translateY(12px);
    background:var(--surface);border:1px solid var(--border);color:var(--text);
    padding:10px 20px;border-radius:12px;font-size:13px;opacity:0;
    transition:all .3s;z-index:200;pointer-events:none;box-shadow:var(--sh-lg);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .loading{text-align:center;padding:24px;color:var(--text-dim);font-size:13px}
  .via-cal{font-size:10px;color:var(--text-faint);font-style:italic}

  @media(max-width:480px){
    .app{padding:20px 14px 100px}
    .form-panel{padding:24px 18px calc(28px + env(safe-area-inset-bottom))}
    .week-item{padding:8px 10px;gap:8px}
    .week-item-time{min-width:82px;font-size:11px}
    .day-toggle{width:34px;height:34px;font-size:12px}
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-left"><h1><span>한얼</span> 스케줄</h1></div>
    <div class="header-right">
      <button class="icon-btn" id="themeToggle" onclick="toggleTheme()" title="테마 전환"><span id="themeIcon">☀</span></button>
      <a class="icon-btn" href="https://docs.google.com/spreadsheets/d/1hMfhClmRJ5edl-fmtwWytk5B8eFWMyvsKx8WkbSIqiE/edit" target="_blank" title="구글 시트" style="text-decoration:none"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="2" width="12" height="12" rx="2"/><line x1="2" y1="6" x2="14" y2="6"/><line x1="2" y1="10" x2="14" y2="10"/><line x1="6" y1="2" x2="6" y2="14"/></svg></a>
      <a class="icon-btn" href="https://github.com/HanEool/haneol-schedule" target="_blank" title="GitHub" style="text-decoration:none"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg></a>
      <button class="sync-btn" id="syncBtn" onclick="syncCalendar()">동기화</button>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="week" onclick="switchTab('week')">주간</button>
    <button class="tab" data-tab="routine" onclick="switchTab('routine')">루틴</button>
    <button class="tab" data-tab="event" onclick="switchTab('event')">일정</button>
    <button class="tab" data-tab="care" onclick="switchTab('care')">케어</button>
  </div>

  <div class="tab-panel active" id="panel-week">
    <div class="week-nav">
      <button class="week-nav-btn" onclick="changeWeek(-1)">&#8249;</button>
      <span class="week-label" id="weekLabel"></span>
      <button class="week-nav-btn" onclick="changeWeek(1)">&#8250;</button>
    </div>
    <div id="weekView"></div>
  </div>

  <div class="tab-panel" id="panel-routine"><div id="routineList"></div></div>

  <div class="tab-panel" id="panel-event">
    <div class="week-nav">
      <button class="week-nav-btn" onclick="changeEventMonth(-1)">&#8249;</button>
      <span class="week-label" id="eventMonthLabel"></span>
      <button class="week-nav-btn" onclick="changeEventMonth(1)">&#8250;</button>
    </div>
    <div id="eventList"></div>
  </div>

  <div class="tab-panel" id="panel-care"><div id="careList"></div></div>

  <button class="add-fab" onclick="openAddForm()">+</button>
</div>

<div class="form-overlay" id="routineFormOverlay">
  <div class="form-panel">
    <div class="form-title" id="routineFormTitle">루틴 추가</div>
    <input type="hidden" id="routineEditId">
    <div class="form-group"><label>이름</label><input type="text" id="routineTitle" placeholder="예: 힘의집 운동"></div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="modeWeekly" onclick="setRoutineMode('weekly')">요일 반복</button>
      <button class="mode-btn" id="modeConsecutive" onclick="setRoutineMode('consecutive')">연속 반복</button>
      <button class="mode-btn" id="modeInterval" onclick="setRoutineMode('interval')">N일 간격</button>
    </div>
    <div id="weeklyFields" class="weekly-fields">
      <div class="form-group">
        <label>요일</label>
        <div class="day-selector" id="daySelector">
          <button class="day-toggle" data-day="월">월</button>
          <button class="day-toggle" data-day="화">화</button>
          <button class="day-toggle" data-day="수">수</button>
          <button class="day-toggle" data-day="목">목</button>
          <button class="day-toggle" data-day="금">금</button>
          <button class="day-toggle" data-day="토">토</button>
          <button class="day-toggle" data-day="일">일</button>
        </div>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>시작</label><input type="time" id="routineStart"></div>
      <div class="form-group"><label>종료</label><input type="time" id="routineEnd"></div>
    </div>
    <div id="weeklyDateFields" class="weekly-fields">
      <div class="form-row">
        <div class="form-group"><label>시작일 <span style="color:var(--text-faint);font-weight:400">(선택)</span></label><input type="date" id="routineStartDate"></div>
        <div class="form-group"><label>기한 <span style="color:var(--text-faint);font-weight:400">(선택)</span></label><input type="date" id="routineEndDate"></div>
      </div>
    </div>
    <div id="consecutiveFields" class="consecutive-fields">
      <div class="form-group"><label>시작일</label><input type="date" id="routineConsecStart"></div>
      <div class="form-group"><label>연속일수</label><input type="number" id="routineConsecDays" placeholder="10" min="1"></div>
    </div>
    <div id="intervalFields" class="consecutive-fields">
      <div class="form-group"><label>시작일</label><input type="date" id="routineIntervalStart"></div>

<div class="toast" id="toast"></div>

<script>
var API_URL='https://script.google.com/a/macros/somaandbody.com/s/AKfycbz23iMsMa7QiETq50kVDTj8KUtRoSzBqsZZhkDCqC7ZZmlyFjv5IqJ6E_KAKyZT3IFI/exec';
var currentWeekDate=new Date(),currentEventMonth=new Date(),routinesCache=[],eventsCache=[],caresCache=[],isSaving=false,routineMode='weekly',careFilterTag='';

function toggleTheme(){
  var h=document.documentElement,n=h.getAttribute('data-theme')==='bright'?'dark':'bright';
  h.setAttribute('data-theme',n);localStorage.setItem('scheduleTheme',n);
  document.getElementById('themeIcon').textContent=n==='bright'?'☀':'☾';
  document.querySelector('meta[name=theme-color]').content=n==='bright'?'#9b8abf':'#18161e';
}
function loadTheme(){var s=localStorage.getItem('scheduleTheme')||'bright';document.documentElement.setAttribute('data-theme',s);document.getElementById('themeIcon').textContent=s==='bright'?'☀':'☾'}

function apiGet(p){return fetch(API_URL+'?'+new URLSearchParams(p)).then(function(r){return r.text()}).then(function(t){try{return JSON.parse(t)}catch(e){console.error('API:',t);throw new Error('API 응답 오류')}})}
function apiWrite(action,data,id){var p={action:action};if(data)p.data=JSON.stringify(data);if(id)p.id=id;return fetch(API_URL+'?'+new URLSearchParams(p)).then(function(r){return r.text()}).then(function(t){var j;try{j=JSON.parse(t)}catch(e){console.error('API raw:',t.substring(0,500));throw new Error('API 응답 파싱 실패')}if(j.error)throw new Error(j.error);return j})}

function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2500)}

function switchTab(n){document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('active',t.dataset.tab===n)});document.querySelectorAll('.tab-panel').forEach(function(p){p.classList.toggle('active',p.id==='panel-'+n)});if(n==='week')loadWeekView();else if(n==='routine')loadRoutines();else if(n==='event')loadEvents();else if(n==='care')loadCares()}

var DAY_NAMES=['일','월','화','수','목','금','토'];
function getMonday(d){var dt=new Date(d);dt.setDate(dt.getDate()-((dt.getDay()+6)%7));return dt}
function formatDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function changeWeek(dir){currentWeekDate.setDate(currentWeekDate.getDate()+dir*7);loadWeekView()}

function loadWeekView(){
  var c=document.getElementById('weekView');c.innerHTML='<div class="loading">불러오는 중...</div>';
  var mon=getMonday(currentWeekDate),sun=new Date(mon);sun.setDate(mon.getDate()+6);
  document.getElementById('weekLabel').textContent=(mon.getMonth()+1)+'월 '+mon.getDate()+'일 — '+(sun.getMonth()+1)+'월 '+sun.getDate()+'일';
  apiGet({action:'getWeekView',date:formatDate(currentWeekDate)}).then(function(d){renderWeekView(d,mon)}).catch(function(){c.innerHTML='<div class="empty-state">데이터를 불러올 수 없습니다.</div>'});
}

function renderWeekView(data,monday){
  var c=document.getElementById('weekView'),today=formatDate(new Date());
  if(!data.items||!data.items.length){c.innerHTML='<div class="empty-state">이번 주 일정이 없습니다.</div>';return}
  var g={};for(var i=0;i<7;i++){var d=new Date(monday);d.setDate(monday.getDate()+i);g[formatDate(d)]=[]}
  data.items.forEach(function(it){if(g[it.date])g[it.date].push(it)});
  var h='';
  Object.entries(g).forEach(function(entry){
    var date=entry[0],items=entry[1],d=new Date(date+'T00:00:00'),dn=DAY_NAMES[d.getDay()],isT=date===today;
    h+='<div class="day-section"><div class="day-header'+(isT?' today':'')+'"><span>'+dn+'요일'+(isT?' · 오늘':'')+'</span><span>'+(d.getMonth()+1)+'/'+d.getDate()+'</span></div>';
    if(!items.length)h+='<div class="empty-day">—</div>';
    else items.forEach(function(it){
      var cls='week-item',bc='badge-event',bt='일정';
      if(it.status==='cancelled'){cls+=' cancelled';bc='badge-cancelled';bt='취소'}
      else if(it.isRoutine||it.routineId){cls+=' routine';bc='badge-routine';bt='루틴'}
      else cls+=' event';
      h+='<div class="'+cls+'"><span class="week-item-time">'+it.startTime+' – '+it.endTime+'</span><span class="week-item-title">'+it.title+'</span><span class="badge '+bc+'">'+bt+'</span></div>';
    });
    h+='</div>';
  });
  c.innerHTML=h;
}

function setRoutineMode(mode){
  routineMode=mode;
  document.getElementById('modeWeekly').classList.toggle('active',mode==='weekly');
  document.getElementById('modeConsecutive').classList.toggle('active',mode==='consecutive');
  document.getElementById('modeInterval').classList.toggle('active',mode==='interval');
  var wf=document.querySelectorAll('.weekly-fields'),cf=document.getElementById('consecutiveFields'),inf=document.getElementById('intervalFields');
  wf.forEach(function(el){el.classList.toggle('hide',mode!=='weekly')});
  cf.classList.toggle('show',mode==='consecutive');
  inf.classList.toggle('show',mode==='interval');
}
function isIntervalRoutine(r){return r.dayOfWeek&&r.dayOfWeek.indexOf('간격:')=== 0}
function getIntervalDays(r){return parseInt(r.dayOfWeek.split(':')[1])||1}
function isConsecutiveRoutine(r){
  if(isIntervalRoutine(r))return false;
  var allDays='월,화,수,목,금,토,일';
  var days=r.dayOfWeek.split(',').map(function(d){return d.trim()}).sort().join(',');
  var sorted=allDays.split(',').sort().join(',');
  return days===sorted&&r.startDate&&r.endDate;
}
function getConsecutiveDays(r){
  var s=new Date(r.startDate+'T00:00:00'),e=new Date(r.endDate+'T00:00:00');
  return Math.round((e-s)/(1000*60*60*24))+1;
}

function loadRoutines(){
  var c=document.getElementById('routineList');c.innerHTML='<div class="loading">불러오는 중...</div>';
  apiGet({action:'getRoutines'}).then(function(d){routinesCache=d;renderRoutines()}).catch(function(){c.innerHTML='<div class="empty-state">데이터를 불러올 수 없습니다.</div>'});
}
function renderRoutines(){
  var c=document.getElementById('routineList');
  if(!routinesCache.length){c.innerHTML='<div class="empty-state">등록된 루틴이 없습니다.</div>';return}
  var all=['월','화','수','목','금','토','일'];
  c.innerHTML=routinesCache.map(function(r){
    var isInt=isIntervalRoutine(r),isCon=isConsecutiveRoutine(r);
    var extra='';if(r.address)extra+='<div class="card-meta" style="margin-top:4px">📍 '+r.address+'</div>';if(r.memo)extra+='<div class="card-meta" style="margin-top:4px">'+r.memo+'</div>';
    var actions='<div class="card-actions"><button class="btn-sm" onclick="editRoutine(\''+r.id+'\')">수정</button><button class="btn-sm danger" onclick="removeRoutine(\''+r.id+'\')">삭제</button></div>';
    var header='<div class="card-header"><span class="card-title">'+r.title+'</span>'+actions+'</div>';
    if(isInt){
      var intDays=getIntervalDays(r);
      var startText=r.startDate?r.startDate+' ~':'';
      return '<div class="card">'+header+'<div class="card-meta">'+r.startTime+' – '+r.endTime+'</div>'+extra+'<div class="consecutive-badge">'+intDays+'일 간격'+(startText?' ('+startText+')':'')+'</div></div>';
    }
    if(isCon){
      var n=getConsecutiveDays(r);
      return '<div class="card">'+header+'<div class="card-meta">'+r.startTime+' – '+r.endTime+'</div>'+extra+'<div class="consecutive-badge">연속 '+n+'일 ('+r.startDate+' ~ '+r.endDate+')</div></div>';
    }
    var ad=r.dayOfWeek.split(',').map(function(d){return d.trim()});
    var chips=all.map(function(d){return '<span class="day-chip'+(ad.includes(d)?' active':'')+'">'+d+'</span>'}).join('');
    var pt='';if(r.startDate&&r.endDate)pt=r.startDate+' ~ '+r.endDate;else if(r.startDate)pt=r.startDate+' ~';else if(r.endDate)pt='~ '+r.endDate;
    var pl=pt?' <span class="badge badge-modified">'+pt+'</span>':'';
    return '<div class="card">'+header+'<div class="card-meta">'+r.startTime+' – '+r.endTime+pl+'</div>'+extra+'<div class="day-chips">'+chips+'</div></div>';
  }).join('');
}
function openRoutineForm(r){
  document.getElementById('routineFormTitle').textContent=r?'루틴 수정':'루틴 추가';
  document.getElementById('routineEditId').value=r?r.id:'';
  document.getElementById('routineTitle').value=r?r.title:'';
  document.getElementById('routineStart').value=r?r.startTime:'';
  document.getElementById('routineEnd').value=r?r.endTime:'';
  document.getElementById('routineAddress').value=r?r.address:'';
  document.getElementById('routineMemo').value=r?r.memo:'';
  document.getElementById('routineConsecStart').value='';
  document.getElementById('routineConsecDays').value='';
  document.getElementById('routineIntervalStart').value='';
  document.getElementById('routineIntervalDays').value='';
  document.getElementById('routineStartDate').value='';
  document.getElementById('routineEndDate').value='';
  document.querySelectorAll('#daySelector .day-toggle').forEach(function(b){b.classList.remove('selected')});
  if(r&&isIntervalRoutine(r)){
    setRoutineMode('interval');
    document.getElementById('routineIntervalStart').value=r.startDate;
    document.getElementById('routineIntervalDays').value=getIntervalDays(r);
  }else if(r&&isConsecutiveRoutine(r)){
    setRoutineMode('consecutive');
    document.getElementById('routineConsecStart').value=r.startDate;
    document.getElementById('routineConsecDays').value=getConsecutiveDays(r);
  }else{
    setRoutineMode('weekly');
    document.getElementById('routineStartDate').value=r?r.startDate:'';
    document.getElementById('routineEndDate').value=r?r.endDate:'';
    var ad=r?r.dayOfWeek.split(',').map(function(d){return d.trim()}):[];
    document.querySelectorAll('#daySelector .day-toggle').forEach(function(b){b.classList.toggle('selected',ad.includes(b.dataset.day))});
  }
  document.getElementById('routineFormOverlay').classList.add('open');
}
function editRoutine(id){var r=routinesCache.find(function(r){return r.id===id});if(r)openRoutineForm(r)}
function saveRoutine(){
  if(isSaving)return;
  var id=document.getElementById('routineEditId').value,title=document.getElementById('routineTitle').value.trim(),
    st=document.getElementById('routineStart').value,et=document.getElementById('routineEnd').value;
  var dayOfWeek,startDate,endDate;
  if(routineMode==='interval'){
    var intStart=document.getElementById('routineIntervalStart').value,intDays=parseInt(document.getElementById('routineIntervalDays').value);
    if(!title||!st||!et||!intStart||!intDays){showToast('모든 항목을 입력해주세요.');return}
    dayOfWeek='간격:'+intDays;
    startDate=intStart;
    endDate='';
  }else if(routineMode==='consecutive'){
    var consecStart=document.getElementById('routineConsecStart').value,consecDays=parseInt(document.getElementById('routineConsecDays').value);
    if(!title||!st||!et||!consecStart||!consecDays){showToast('모든 항목을 입력해주세요.');return}
    dayOfWeek='월,화,수,목,금,토,일';
    startDate=consecStart;
    var ed=new Date(consecStart+'T00:00:00');ed.setDate(ed.getDate()+consecDays-1);
    endDate=formatDate(ed);
  }else{
    var sd=[];document.querySelectorAll('#daySelector .day-toggle.selected').forEach(function(b){sd.push(b.dataset.day)});
    if(!title||!st||!et||!sd.length){showToast('모든 항목을 입력해주세요.');return}
    dayOfWeek=sd.join(',');
    startDate=document.getElementById('routineStartDate').value||'';
    endDate=document.getElementById('routineEndDate').value||'';
  }
  isSaving=true;setSaveBtn('routineFormOverlay',true);
  var data={title:title,startTime:st,endTime:et,dayOfWeek:dayOfWeek,startDate:startDate,endDate:endDate,address:document.getElementById('routineAddress').value||'',memo:document.getElementById('routineMemo').value||''};
  var p;if(id){data.id=id;p=apiWrite('updateRoutine',data)}else{p=apiWrite('addRoutine',data)}
  p.then(function(){showToast(id?'루틴이 수정되었습니다.':'루틴이 추가되었습니다.');closeForm('routineFormOverlay');loadRoutines()}).catch(function(e){showToast('오류: '+e.message)}).finally(function(){isSaving=false;setSaveBtn('routineFormOverlay',false)});
}
function removeRoutine(id){if(!confirm('이 루틴을 삭제하시겠습니까?'))return;apiWrite('deleteRoutine',null,id).then(function(){showToast('삭제되었습니다.');loadRoutines()}).catch(function(e){showToast('오류: '+e.message)})}

function changeEventMonth(d){currentEventMonth.setMonth(currentEventMonth.getMonth()+d);loadEvents()}
function loadEvents(){
  var c=document.getElementById('eventList');c.innerHTML='<div class="loading">불러오는 중...</div>';
  var y=currentEventMonth.getFullYear(),m=currentEventMonth.getMonth();
  document.getElementById('eventMonthLabel').textContent=y+'년 '+(m+1)+'월';
  apiGet({action:'getEvents',startDate:formatDate(new Date(y,m,1)),endDate:formatDate(new Date(y,m+1,0))}).then(function(d){eventsCache=d;renderEvents()}).catch(function(){c.innerHTML='<div class="empty-state">데이터를 불러올 수 없습니다.</div>'});
}
function renderEvents(){
  var c=document.getElementById('eventList');
  if(!eventsCache.length){c.innerHTML='<div class="empty-state">이 달의 일정이 없습니다.</div>';return}
  c.innerHTML=eventsCache.map(function(e){
    var bc='badge-event',bt='일정';
    if(e.status==='cancelled'){bc='badge-cancelled';bt='취소'}else if(e.status==='modified'){bc='badge-modified';bt='변경'}else if(e.routineId){bc='badge-modified';bt='예외'}
    var dn=DAY_NAMES[new Date(e.date+'T00:00:00').getDay()];
    var extra='';if(e.address)extra+='<div class="card-meta" style="margin-top:4px">📍 '+e.address+'</div>';if(e.memo)extra+='<div class="card-meta" style="margin-top:4px">'+e.memo+'</div>';
    return '<div class="card"><div class="card-header"><span class="card-title">'+(e.status==='cancelled'?'<s>'+e.title+'</s>':e.title)+'</span><div class="card-actions">'+(e.status!=='cancelled'?'<button class="btn-sm" onclick="editEvent(\''+e.id+'\')">수정</button>':'')+'<button class="btn-sm danger" onclick="removeEvent(\''+e.id+'\')">삭제</button></div></div><div class="card-meta">'+e.date+' ('+dn+') · '+e.startTime+' – '+e.endTime+' <span class="badge '+bc+'">'+bt+'</span>'+(e.source==='calendar'?' <span class="via-cal">via 캘린더</span>':'')+'</div>'+extra+'</div>';
  }).join('');
}
function openEventForm(ev){
  document.getElementById('eventFormTitle').textContent=ev?'일정 수정':'일정 추가';
  document.getElementById('eventEditId').value=ev?ev.id:'';
  document.getElementById('eventTitle').value=ev?ev.title:'';
  document.getElementById('eventDate').value=ev?ev.date:formatDate(new Date());
  document.getElementById('eventStart').value=ev?ev.startTime:'';
  document.getElementById('eventEnd').value=ev?ev.endTime:'';
  document.getElementById('eventAddress').value=ev?ev.address:'';
  document.getElementById('eventMemo').value=ev?ev.memo:'';
  document.getElementById('eventFormOverlay').classList.add('open');
}
function editEvent(id){var e=eventsCache.find(function(e){return e.id===id});if(e)openEventForm(e)}
function saveEvent(){
  if(isSaving)return;
  var id=document.getElementById('eventEditId').value,title=document.getElementById('eventTitle').value.trim(),
    date=document.getElementById('eventDate').value,st=document.getElementById('eventStart').value,et=document.getElementById('eventEnd').value;
  if(!title||!date||!st||!et){showToast('모든 항목을 입력해주세요.');return}
  isSaving=true;setSaveBtn('eventFormOverlay',true);
  var data={title:title,date:date,startTime:st,endTime:et,address:document.getElementById('eventAddress').value||'',memo:document.getElementById('eventMemo').value||''};
  var p;
  if(id){data.id=id;var ex=eventsCache.find(function(e){return e.id===id});data.source=ex?ex.source:'sheets';data.routineId=ex?ex.routineId:'';data.status=ex?ex.status:'active';p=apiWrite('updateEvent',data)}
  else{p=apiWrite('addEvent',data)}
  p.then(function(){showToast(id?'일정이 수정되었습니다.':'일정이 추가되었습니다.');closeForm('eventFormOverlay');loadEvents()}).catch(function(e){showToast('오류: '+e.message)}).finally(function(){isSaving=false;setSaveBtn('eventFormOverlay',false)});
}
function removeEvent(id){if(!confirm('이 일정을 삭제하시겠습니까?'))return;apiWrite('deleteEvent',null,id).then(function(){showToast('삭제되었습니다.');loadEvents()}).catch(function(e){showToast('오류: '+e.message)})}

function loadCares(){
  var c=document.getElementById('careList');c.innerHTML='<div class="loading">불러오는 중...</div>';
  apiGet({action:'getCares'}).then(function(d){caresCache=d;renderCares()}).catch(function(){c.innerHTML='<div class="empty-state">데이터를 불러올 수 없습니다.</div>'});
}
function getCareStatus(care){
  var cycle=parseInt(care.cycle);
  if(!cycle){return {label:'습관',cls:'habit',progress:0,isHabit:true}}
  var today=new Date();today.setHours(0,0,0,0);
  var lastDone=care.lastDone?new Date(care.lastDone+'T00:00:00'):null,nextDate=care.nextDate?new Date(care.nextDate+'T00:00:00'):null;
  var daysSince=lastDone?Math.floor((today-lastDone)/(1000*60*60*24)):null;
  var daysUntilDue=lastDone?cycle-daysSince:null;
  var daysUntilNext=nextDate?Math.floor((nextDate-today)/(1000*60*60*24)):null;
  var progress=daysSince!==null?Math.min(daysSince/cycle,1):1;
  var label,cls;
  if(daysSince===null&&nextDate===null){label='미완료';cls='overdue'}
  else if(daysSince!==null&&daysUntilDue>30){label='정상 ('+daysUntilDue+'일 남음)';cls='ok'}
  else if(daysSince!==null&&daysUntilDue>0&&daysUntilDue<=30){
    if(nextDate){label='예정 ('+formatDate(nextDate)+')';cls='scheduled'}
    else{label='임박 ('+daysUntilDue+'일 남음)';cls='soon'}
  }
  else if(daysSince!==null&&daysUntilDue<=0){
    if(nextDate&&daysUntilNext>=0){label='예정 ('+formatDate(nextDate)+')';cls='scheduled'}
    else{label='주의 ('+Math.abs(daysUntilDue)+'일 초과)';cls='overdue'}
  }
  else if(nextDate){label='예정 ('+formatDate(nextDate)+')';cls='scheduled'}
  else{label='주의';cls='overdue'}
  return {label:label,cls:cls,progress:progress,isHabit:false};
}
function renderCares(){
  var c=document.getElementById('careList');
  if(!caresCache.length){c.innerHTML='<div class="empty-state">등록된 케어 항목이 없습니다.</div>';return}
  var allTags=[];
  caresCache.forEach(function(care){
    if(care.keywords){care.keywords.split(',').forEach(function(k){k=k.trim();if(k&&allTags.indexOf(k)===-1)allTags.push(k)})}
  });
  var tagHtml='';
  if(allTags.length){
    tagHtml='<div class="tag-filter"><button class="tag-chip'+(careFilterTag===''?' active':'')+'" onclick="setCareFilter(\'\')">전체</button>';
    allTags.forEach(function(t){tagHtml+='<button class="tag-chip'+(careFilterTag===t?' active':'')+'" onclick="setCareFilter(\''+t+'\')">'+t+'</button>'});
    tagHtml+='</div>';
  }
  var filtered=careFilterTag?caresCache.filter(function(care){return care.keywords&&care.keywords.indexOf(careFilterTag)!==-1}):caresCache;
  c.innerHTML=tagHtml+filtered.map(function(care){
    var s=getCareStatus(care),dur=parseInt(care.duration)||1;
    var kwText=care.keywords?'<div class="card-meta" style="margin-top:4px">🔍 '+care.keywords+'</div>':'';
    var memoText=care.memo?'<div class="card-meta" style="margin-top:4px">'+care.memo+'</div>':'';
    if(s.isHabit){
      return '<div class="card"><div class="card-header"><span class="card-title">'+care.title+'</span><div class="card-actions"><button class="btn-sm" onclick="editCare(\''+care.id+'\')">수정</button><button class="btn-sm danger" onclick="removeCare(\''+care.id+'\')">삭제</button></div></div><div class="card-meta"><span class="care-status care-habit">습관</span></div>'+kwText+memoText+'</div>';
    }
    var cycleText=care.cycle+'일 주기'+(dur>1?' · '+dur+'일간 진행':'');
    var lastText=care.lastDone?'마지막: '+care.lastDone:'마지막: -';
    var nextText=care.nextDate?'예정: '+care.nextDate:'';
    return '<div class="card"><div class="card-header"><span class="card-title">'+care.title+'</span><div class="card-actions"><button class="btn-sm" onclick="markCareDone(\''+care.id+'\')">완료</button><button class="btn-sm" onclick="editCare(\''+care.id+'\')">수정</button><button class="btn-sm danger" onclick="removeCare(\''+care.id+'\')">삭제</button></div></div><div class="card-meta">'+cycleText+' <span class="care-status care-'+s.cls+'">'+s.label+'</span></div><div class="card-meta" style="margin-top:4px">'+lastText+(nextText?' · '+nextText:'')+'</div>'+kwText+memoText+'<div class="care-progress"><div class="care-progress-bar '+s.cls+'" style="width:'+Math.round(s.progress*100)+'%"></div></div></div>';
  }).join('');
}
function openCareForm(care){
  document.getElementById('careFormTitle').textContent=care?'케어 수정':'케어 추가';
  document.getElementById('careEditId').value=care?care.id:'';
  document.getElementById('careTitle').value=care?care.title:'';
  document.getElementById('careCycle').value=care?care.cycle:'';
  document.getElementById('careDuration').value=care?care.duration:'1';
  document.getElementById('careLastDone').value=care?care.lastDone:'';
  document.getElementById('careNextDate').value=care?care.nextDate:'';
  document.getElementById('careKeywords').value=care?care.keywords:'';
  document.getElementById('careMemo').value=care?care.memo:'';
  document.getElementById('careFormOverlay').classList.add('open');
}
function editCare(id){var c=caresCache.find(function(c){return c.id===id});if(c)openCareForm(c)}
function saveCare(){
  if(isSaving)return;
  var id=document.getElementById('careEditId').value,title=document.getElementById('careTitle').value.trim(),
    cycle=document.getElementById('careCycle').value;
  if(!title){showToast('이름을 입력해주세요.');return}
  isSaving=true;setSaveBtn('careFormOverlay',true);
  var data={title:title,cycle:cycle,duration:document.getElementById('careDuration').value||'1',lastDone:document.getElementById('careLastDone').value||'',nextDate:document.getElementById('careNextDate').value||'',keywords:document.getElementById('careKeywords').value||'',memo:document.getElementById('careMemo').value||''};
  var p;if(id){data.id=id;p=apiWrite('updateCare',data)}else{p=apiWrite('addCare',data)}
  p.then(function(){showToast(id?'케어가 수정되었습니다.':'케어가 추가되었습니다.');closeForm('careFormOverlay');loadCares()}).catch(function(e){showToast('오류: '+e.message)}).finally(function(){isSaving=false;setSaveBtn('careFormOverlay',false)});
}
function setCareFilter(tag){careFilterTag=tag;renderCares()}
function removeCare(id){if(!confirm('이 케어 항목을 삭제하시겠습니까?'))return;apiWrite('deleteCare',null,id).then(function(){showToast('삭제되었습니다.');loadCares()}).catch(function(e){showToast('오류: '+e.message)})}
function markCareDone(id){
  var care=caresCache.find(function(c){return c.id===id});if(!care)return;
  if(!confirm(care.title+' — 오늘 완료로 기록할까요?'))return;
  var data={id:care.id,title:care.title,cycle:care.cycle,duration:care.duration,lastDone:formatDate(new Date()),nextDate:care.nextDate||'',keywords:care.keywords||'',memo:care.memo||''};
  apiWrite('updateCare',data).then(function(){showToast('완료 기록됨');loadCares()}).catch(function(e){showToast('오류: '+e.message)});
}

function syncCalendar(){
  var b=document.getElementById('syncBtn');b.disabled=true;b.textContent='동기화 중…';
  apiWrite('syncCalendar').then(function(r){var n=(r.results&&r.results.sheetsToCalendar?r.results.sheetsToCalendar.synced:0)+(r.results&&r.results.calendarToSheets?r.results.calendarToSheets.synced:0);showToast(n+'건 동기화 완료');switchTab(document.querySelector('.tab.active').dataset.tab)}).catch(function(e){showToast('동기화 오류: '+e.message)}).finally(function(){b.disabled=false;b.textContent='동기화'});
}

function openAddForm(){document.getElementById('addChoiceOverlay').classList.add('open')}
function closeForm(id){document.getElementById(id).classList.remove('open')}
function setSaveBtn(oid,loading){var b=document.querySelector('#'+oid+' .btn-primary');if(!b)return;if(loading){b.dataset.orig=b.textContent;b.textContent='저장 중…';b.disabled=true}else{b.textContent=b.dataset.orig||'저장';b.disabled=false}}

document.querySelectorAll('#daySelector .day-toggle').forEach(function(b){b.addEventListener('click',function(){b.classList.toggle('selected')})});
document.querySelectorAll('.form-overlay').forEach(function(o){o.addEventListener('click',function(e){if(e.target===o)o.classList.remove('open')})});

loadTheme();loadWeekView();
</script>
